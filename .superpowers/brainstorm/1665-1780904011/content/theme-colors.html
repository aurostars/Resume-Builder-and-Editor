<h2>主题色预设方案</h2>
<p class="subtitle">你更喜欢哪组色彩风格？可以多选</p>

<div class="options" data-multiselect>
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>温暖自然系</h3>
      <p>柔和、亲切、有温度</p>
      <div style="display:flex;gap:8px;margin-top:8px;">
        <div style="width:40px;height:40px;border-radius:8px;background:#5B8C5A;" title="森林绿"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#C4A35A;" title="暖金色"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#D4816B;" title="陶土橘"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#8B6F4E;" title="木棕色"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#7A9E7E;" title="薄荷绿"></div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>清新雅致系</h3>
      <p>淡雅、清爽、专业感</p>
      <div style="display:flex;gap:8px;margin-top:8px;">
        <div style="width:40px;height:40px;border-radius:8px;background:#5B7FA6;" title="雾蓝色"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#6B9DAD;" title="湖水蓝"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#8EA8C3;" title="天青色"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#7C9885;" title="灰绿色"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#9CAFA2;" title="竹青色"></div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>柔和浪漫系</h3>
      <p>轻柔、文艺、有气质</p>
      <div style="display:flex;gap:8px;margin-top:8px;">
        <div style="width:40px;height:40px;border-radius:8px;background:#B07BAC;" title="紫藤色"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#C4878E;" title="玫瑰粉"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#D4A574;" title="杏仁色"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#A3C4BC;" title="薄荷奶绿"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#C9B8D4;" title="淡丁香"></div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="d" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>沉稳商务系</h3>
      <p>稳重、大气、可信赖</p>
      <div style="display:flex;gap:8px;margin-top:8px;">
        <div style="width:40px;height:40px;border-radius:8px;background:#2C5F7C;" title="深海蓝"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#4A6741;" title="墨绿色"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#6B4C6E;" title="暗紫色"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#8C5E3C;" title="深棕色"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#4A5568;" title="石墨灰"></div>
      </div>
    </div>
  </div>
</div>
